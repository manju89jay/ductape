syntax = "proto3";

message SensorReading {
  uint32 timestamp = 1;
  float latitude = 2;
  float longitude = 3;
  float ground_speed = 4;
  float altitude_m = 5;
  uint32 sensor_id = 6;
  float confidence = 7;
  uint32 source_quality = 8;
}

enum SensorStatus {
  UNKNOWN = 0;
  ACTIVE = 1;
  INACTIVE = 2;
  ERROR = 3;
  DEGRADED = 4;
}
